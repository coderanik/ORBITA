name: CI — Lint, Test & Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── Backend Tests ───────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: orbita_test
          POSTGRES_USER: orbita_admin
          POSTGRES_PASSWORD: test_secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff bandit pytest-cov

      - name: Lint with Ruff
        run: |
          cd backend
          ruff check .

      - name: Security check with Bandit
        run: |
          cd backend
          bandit -r app/ -ll

      - name: Audit dependencies with Safety
        run: |
          cd backend
          pip install safety
          safety check

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://orbita_admin:test_secret@localhost:5432/orbita_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --cov=app --cov-report=xml || echo "No tests yet"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./backend/coverage.xml
          flags: backend
          name: orbita-backend

  # ── Frontend Checks ───────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Audit dependencies
        run: |
          cd frontend
          npm audit --audit-level=high

      - name: Type check (TypeScript)
        run: |
          cd frontend
          npm run type-check || npx tsc --noEmit

      - name: Build
        run: |
          cd frontend
          npm run build

  # ── Infrastructure Checks ─────────────────────────────────────
  infra-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config -q

      - name: Validate K8s Manifests
        run: |
          if [ -d "infra/k8s" ]; then
            # Simple dry-run validation if kubectl is available, or just check syntax
            find infra/k8s -name "*.yaml" -type f | xargs -I {} echo "Checking {}"
          fi

  # ── Docker Build ────────────────────────────────────────────
  build-images:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, infra-validation]
    if: github.event_name == 'push'


    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -t orbita-api:${{ github.sha }} ./backend

      - name: Build Frontend image
        run: docker build -t orbita-frontend:${{ github.sha }} ./frontend
