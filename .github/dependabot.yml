# Dependabot configuration
# Documentation: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Maintain dependencies for the Backend (Python)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "daily"
    allow:
      - dependency-type: "all"
    labels:
      - "backend"
      - "security"

  # Maintain dependencies for the Frontend (NPM)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
    labels:
      - "frontend"
      - "security"
