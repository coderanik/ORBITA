apiVersion: v1
kind: Service
metadata:
  name: orbita-redis
  namespace: orbita
spec:
  selector:
    app: orbita-redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orbita-redis
  namespace: orbita
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orbita-redis
  template:
    metadata:
      labels:
        app: orbita-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
