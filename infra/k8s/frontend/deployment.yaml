apiVersion: v1
kind: Service
metadata:
  name: orbita-frontend
  namespace: orbita
spec:
  selector:
    app: orbita-frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orbita-frontend
  namespace: orbita
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orbita-frontend
  template:
    metadata:
      labels:
        app: orbita-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/anik/orbita-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
