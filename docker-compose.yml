services:
  # ── PostgreSQL + PostGIS + TimescaleDB ──────────────────────────
  orbita-db:
    build:
      context: ./docker
      dockerfile: db.Dockerfile
    container_name: orbita-postgres
    environment:
      POSTGRES_DB: orbita_registry
      POSTGRES_USER: orbita_admin
      POSTGRES_PASSWORD: orbita_secret_2026
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - orbita-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbita_admin -d orbita_registry"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (cache + message broker) ──────────────────────────────
  orbita-redis:
    image: redis:7-alpine
    container_name: orbita-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - orbita-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── pgAdmin (database management UI) ───────────────────────────
  orbita-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: orbita-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@orbita.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8081:80"
    networks:
      - orbita-network
    depends_on:
      orbita-db:
        condition: service_healthy
    restart: unless-stopped

  # ── FastAPI Backend ─────────────────────────────────────────────
  orbita-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orbita-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://orbita_admin:orbita_secret_2026@orbita-db:5432/orbita_registry
      DATABASE_URL_SYNC: postgresql+psycopg2://orbita_admin:orbita_secret_2026@orbita-db:5432/orbita_registry
      REDIS_URL: redis://orbita-redis:6379/0
      ENVIRONMENT: development
    depends_on:
      orbita-db:
        condition: service_healthy
      orbita-redis:
        condition: service_healthy
    networks:
      - orbita-network
    restart: unless-stopped

  # ── React/Vite Frontend ─────────────────────────────────────────
  orbita-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orbita-frontend
    ports:
      - "5173:80"
    depends_on:
      - orbita-api
    networks:
      - orbita-network
    restart: unless-stopped

networks:
  orbita-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
