services:
  # ── PostgreSQL + PostGIS + TimescaleDB (Core Database) ──────────
  # Purpose: Persistent storage for satellite catalogs, telemetry metrics, and RBAC auth.
  orbita-db:
    build:
      context: ./docker
      dockerfile: db.Dockerfile
    container_name: orbita-postgres
    environment:
      POSTGRES_DB: orbita_registry
      POSTGRES_USER: orbita_admin
      POSTGRES_PASSWORD: orbita_secret_2026
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - orbita-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbita_admin -d orbita_registry"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis (In-Memory Cache) ─────────────────────────────────────
  # Purpose: Fast data retrieval (caching API responses) and WebSocket pub/sub.
  orbita-redis:
    image: redis:7-alpine
    container_name: orbita-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - orbita-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── RabbitMQ (Message Broker for Celery) ────────────────────────
  # Purpose: Handles task queues, routing jobs between the API and Celery workers.
  orbita-rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: orbita-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - orbita-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Celery Worker (Background Task Executor) ────────────────────
  # Purpose: Executes long-running tasks asynchronously (e.g., SGP4 propagation, Kessler sims, AI Agents).
  orbita-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orbita-worker
    command: celery -A app.workers.celery_app worker -l info -c 4
    environment:
      DATABASE_URL: postgresql+asyncpg://orbita_admin:orbita_secret_2026@orbita-db:5432/orbita_registry
      DATABASE_URL_SYNC: postgresql+psycopg2://orbita_admin:orbita_secret_2026@orbita-db:5432/orbita_registry
      REDIS_URL: redis://orbita-redis:6379/0
      CELERY_BROKER_URL: amqp://guest:guest@orbita-rabbitmq:5672//
      ENVIRONMENT: development
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      orbita-db:
        condition: service_healthy
      orbita-redis:
        condition: service_healthy
      orbita-rabbitmq:
        condition: service_healthy
    networks:
      - orbita-network
    restart: unless-stopped

  # ── Celery Beat (Periodic Task Scheduler) ───────────────────────
  # Purpose: Triggers recurring jobs (e.g., fetch TLEs every 30m, Conjunction Scan every 1h).
  orbita-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orbita-beat
    command: celery -A app.workers.celery_app beat -l info
    environment:
      DATABASE_URL: postgresql+asyncpg://orbita_admin:orbita_secret_2026@orbita-db:5432/orbita_registry
      DATABASE_URL_SYNC: postgresql+psycopg2://orbita_admin:orbita_secret_2026@orbita-db:5432/orbita_registry
      REDIS_URL: redis://orbita-redis:6379/0
      CELERY_BROKER_URL: amqp://guest:guest@orbita-rabbitmq:5672//
      ENVIRONMENT: development
    depends_on:
      - orbita-worker
    networks:
      - orbita-network
    restart: unless-stopped

  # ── pgAdmin (database management UI) ───────────────────────────
  orbita-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: orbita-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@orbita.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8081:80"
    networks:
      - orbita-network
    depends_on:
      orbita-db:
        condition: service_healthy
    restart: unless-stopped

  # ── FastAPI Backend (Core API Services) ─────────────────────────
  # Purpose: Handles REST requests, WebSocket streams, and triggers background Celery tasks.
  orbita-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orbita-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://orbita_admin:orbita_secret_2026@orbita-db:5432/orbita_registry
      DATABASE_URL_SYNC: postgresql+psycopg2://orbita_admin:orbita_secret_2026@orbita-db:5432/orbita_registry
      REDIS_URL: redis://orbita-redis:6379/0
      CELERY_BROKER_URL: amqp://guest:guest@orbita-rabbitmq:5672//
      ENVIRONMENT: development
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      orbita-db:
        condition: service_healthy
      orbita-redis:
        condition: service_healthy
      orbita-rabbitmq:
        condition: service_healthy
    networks:
      - orbita-network
    restart: unless-stopped

  # ── React/Vite Frontend (Web Dashboard) ─────────────────────────
  # Purpose: Serves the compiled React app using Nginx. Acts as a reverse proxy to route /api to FastAPI.
  orbita-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orbita-frontend
    ports:
      - "8085:80"
    depends_on:
      - orbita-api
    networks:
      - orbita-network
    restart: unless-stopped

networks:
  orbita-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
