<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ORBITA — ER Diagram (Chen Notation)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#080c14;color:#e0e6f0;overflow:hidden;height:100vh}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:#0d1117;border-bottom:1px solid #1e293b;height:48px;z-index:10;position:relative}
.toolbar h1{font-size:1rem;font-weight:700;color:#93c5fd}
.toolbar .sub{color:#64748b;font-size:.75rem;margin-left:8px}
.controls{display:flex;gap:6px;align-items:center}
.controls button{width:32px;height:32px;border:1px solid #334155;border-radius:6px;background:#1e293b;color:#94a3b8;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.controls button:hover{background:#334155;color:#e2e8f0}
.controls .sep{width:1px;height:20px;background:#334155;margin:0 4px}
.legend-bar{display:flex;gap:16px;align-items:center;padding:6px 24px;background:#0b1120;border-bottom:1px solid #1a2332;font-size:.7rem;color:#64748b;flex-wrap:wrap;height:32px}
.legend-bar .li{display:flex;align-items:center;gap:4px}
.legend-bar svg{width:22px;height:14px;flex-shrink:0}
#viewport{width:100%;height:calc(100vh - 80px);cursor:grab;overflow:hidden;position:relative}
#viewport.dragging{cursor:grabbing}
#viewport svg{position:absolute;top:0;left:0}
.hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);color:#475569;font-size:.7rem;pointer-events:none;z-index:5}
</style>
</head>
<body>
<div class="toolbar">
  <div style="display:flex;align-items:baseline">
    <h1>ORBITA — Entity-Relationship Diagram</h1>
    <span class="sub">Chen Notation · 9 Entities · 126 Attributes · 7 Relationships</span>
  </div>
  <div class="controls">
    <button onclick="zoomBy(1.3)" title="Zoom in">+</button>
    <button onclick="zoomBy(0.7)" title="Zoom out">&minus;</button>
    <div class="sep"></div>
    <button onclick="resetView()" title="Fit all" style="width:auto;padding:0 10px;font-size:.75rem">Fit</button>
  </div>
</div>
<div class="legend-bar">
  <span style="color:#93c5fd;font-weight:600">Legend:</span>
  <div class="li"><svg><rect x="1" y="1" width="20" height="12" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.5"/></svg> Entity</div>
  <div class="li"><svg><rect x="2" y="2" width="18" height="10" rx="1" fill="none" stroke="#f59e0b" stroke-width="1.2"/><rect x="4" y="4" width="14" height="6" rx="1" fill="none" stroke="#f59e0b" stroke-width=".8"/></svg> Associative</div>
  <div class="li"><svg><ellipse cx="11" cy="7" rx="10" ry="6" fill="none" stroke="#a78bfa" stroke-width="1.2"/></svg> Attribute</div>
  <div class="li"><svg><ellipse cx="11" cy="7" rx="10" ry="6" fill="none" stroke="#34d399" stroke-width="1.2"/><line x1="3" y1="10" x2="19" y2="10" stroke="#34d399" stroke-width=".8"/></svg> Primary Key</div>
  <div class="li"><svg><ellipse cx="11" cy="7" rx="10" ry="6" fill="none" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="2,1.5"/></svg> Foreign Key</div>
  <div class="li"><svg><ellipse cx="11" cy="7" rx="10" ry="6" fill="none" stroke="#818cf8" stroke-width="1.2" stroke-dasharray="4,2"/></svg> Derived</div>
  <div class="li"><svg><polygon points="11,1 21,7 11,13 1,7" fill="none" stroke="#f472b6" stroke-width="1.2"/></svg> Relationship</div>
  <div class="li"><div style="width:18px;height:0;border-top:2px dashed #64748b"></div> Temporal</div>
</div>
<div id="viewport"></div>
<div class="hint">Scroll to zoom · Drag to pan</div>

<script>
// ═══════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════
const S = { // schema colors
  catalog:   { c:'#3b82f6', bg:'#3b82f610' },
  tracking:  { c:'#10b981', bg:'#10b98110' },
  telemetry: { c:'#f59e0b', bg:'#f59e0b10' },
  analytics: { c:'#ec4899', bg:'#ec489910' },
};

const E = [
  { id:'SpaceObject', schema:'catalog', x:3200, y:2400, r:460, assoc:false,
    attrs:[
      {n:'object_id',pk:1},{n:'norad_id',u:1},{n:'cospar_id',u:1},{n:'name'},
      {n:'object_type'},{n:'launch_date'},{n:'decay_date'},{n:'launch_site'},
      {n:'country_code'},{n:'operator'},{n:'owner'},{n:'mass_kg'},
      {n:'cross_section_m2'},{n:'orbit_class'},{n:'status'},{n:'purpose'},
      {n:'metadata'},{n:'created_at'},{n:'updated_at'},
    ]},
  { id:'Mission', schema:'catalog', x:700, y:650, r:280, assoc:false,
    attrs:[
      {n:'mission_id',pk:1},{n:'name'},{n:'description'},{n:'operator'},
      {n:'launch_date'},{n:'end_date'},{n:'status'},{n:'metadata'},
      {n:'created_at'},{n:'updated_at'},
    ]},
  { id:'MissionObject', schema:'catalog', x:1700, y:1350, r:160, assoc:true,
    attrs:[
      {n:'mission_id',pk:1,fk:1},{n:'object_id',pk:1,fk:1},{n:'role'},
    ]},
  { id:'OrbitState', schema:'tracking', x:5600, y:900, r:580, assoc:false,
    attrs:[
      {n:'state_id',pk:1},{n:'epoch',pk:1},{n:'object_id',fk:1},
      {n:'position_x_km'},{n:'position_y_km'},{n:'position_z_km'},
      {n:'velocity_x_km_s'},{n:'velocity_y_km_s'},{n:'velocity_z_km_s'},
      {n:'reference_frame'},{n:'position_geom',dv:1},
      {n:'semimajor_axis_km'},{n:'eccentricity'},{n:'inclination_deg'},
      {n:'raan_deg'},{n:'arg_perigee_deg'},{n:'true_anomaly_deg'},
      {n:'mean_anomaly_deg'},{n:'mean_motion_rev_day'},{n:'period_minutes'},
      {n:'apoapsis_km',dv:1},{n:'periapsis_km',dv:1},
      {n:'tle_line1'},{n:'tle_line2'},{n:'covariance_matrix'},
      {n:'source'},{n:'created_at'},
    ]},
  { id:'GroundStation', schema:'tracking', x:6100, y:2900, r:300, assoc:false,
    attrs:[
      {n:'station_id',pk:1},{n:'name'},{n:'location'},{n:'country_code'},
      {n:'operator'},{n:'station_type'},{n:'frequency_bands'},
      {n:'antenna_diameter_m'},{n:'min_elevation_deg'},{n:'capabilities'},
      {n:'is_active'},{n:'created_at'},
    ]},
  { id:'SatelliteTelemetry', schema:'telemetry', x:5100, y:4500, r:260, assoc:false,
    attrs:[
      {n:'telemetry_id',pk:1},{n:'ts',pk:1},{n:'object_id',fk:1},
      {n:'subsystem'},{n:'parameter_name'},{n:'value'},{n:'unit'},
      {n:'quality'},{n:'raw_data'},
    ]},
  { id:'ConjunctionEvent', schema:'analytics', x:1700, y:4700, r:480, assoc:false,
    attrs:[
      {n:'conjunction_id',pk:1},{n:'primary_object_id',fk:1},
      {n:'secondary_object_id',fk:1},{n:'time_of_closest_approach'},
      {n:'miss_distance_km'},{n:'miss_distance_radial_km'},
      {n:'miss_distance_in_track_km'},{n:'miss_distance_cross_track_km'},
      {n:'collision_probability'},{n:'relative_velocity_km_s'},
      {n:'combined_hard_body_radius_m'},{n:'covariance_primary'},
      {n:'covariance_secondary'},{n:'cdm_id'},{n:'cdm_data'},
      {n:'risk_level'},{n:'status'},{n:'recommended_action'},
      {n:'created_at'},{n:'updated_at'},
    ]},
  { id:'SpaceWeather', schema:'analytics', x:3500, y:5700, r:380, assoc:false,
    attrs:[
      {n:'weather_id',pk:1},{n:'ts',pk:1},{n:'solar_flux_f10_7'},
      {n:'kp_index'},{n:'ap_index'},{n:'dst_index'},{n:'bz_gsm_nt'},
      {n:'proton_density_cm3'},{n:'solar_wind_speed_km_s'},
      {n:'proton_flux'},{n:'electron_flux'},{n:'geomagnetic_storm_level'},
      {n:'solar_flare_class'},{n:'data_source'},{n:'is_forecast'},
      {n:'created_at'},
    ]},
  { id:'ManeuverLog', schema:'analytics', x:550, y:3400, r:280, assoc:false,
    attrs:[
      {n:'maneuver_id',pk:1},{n:'object_id',fk:1},{n:'conjunction_id',fk:1},
      {n:'planned_time'},{n:'executed_time'},{n:'delta_v_m_s'},
      {n:'direction'},{n:'status'},{n:'notes'},{n:'created_at'},
    ]},
];

const R = [
  {id:'R1', from:'SpaceObject', to:'OrbitState',          label:'HAS',         cF:'1',cT:'N', dx:4400,dy:1600},
  {id:'R2', from:'SpaceObject', to:'SatelliteTelemetry',  label:'GENERATES',   cF:'1',cT:'N', dx:4150,dy:3450},
  {id:'R3', from:'SpaceObject', to:'ConjunctionEvent',    label:'INVOLVES',    cF:'M',cT:'N', dx:2450,dy:3550},
  {id:'R4', from:'SpaceObject', to:'ManeuverLog',         label:'PERFORMS',    cF:'1',cT:'N', dx:1900,dy:2900},
  {id:'R5', from:'Mission',     to:'SpaceObject',         label:'CONTAINS',    cF:'M',cT:'N', dx:1200,dy:1000, via:'MissionObject'},
  {id:'R6', from:'ConjunctionEvent', to:'ManeuverLog',    label:'TRIGGERS',    cF:'1',cT:'N', dx:1100,dy:4050},
  {id:'R7', from:'SpaceWeather', to:'SatelliteTelemetry', label:'CORRELATES',  cF:'',cT:'',   dx:4300,dy:5100, temporal:true},
];

// Build lookup
const EMap = {}; E.forEach(e => EMap[e.id] = e);

// ═══════════════════════════════════════════════════
//  SVG RENDERING
// ═══════════════════════════════════════════════════
function sv(tag, a, inner='') {
  return `<${tag} ${Object.entries(a).map(([k,v])=>k+'="'+v+'"').join(' ')}>${inner}</${tag}>`;
}

function buildSVG() {
  const W = 7000, H = 6600;
  let layers = { bg:'', relLines:'', attrLines:'', attrs:'', entities:'', diamonds:'', labels:'' };

  // Background grid
  for (let gx=0;gx<W;gx+=200) layers.bg += sv('line',{x1:gx,y1:0,x2:gx,y2:H,stroke:'#111827','stroke-width':.5});
  for (let gy=0;gy<H;gy+=200) layers.bg += sv('line',{x1:0,y1:gy,x2:W,y2:gy,stroke:'#111827','stroke-width':.5});

  // ── Relationship lines ──
  R.forEach(r => {
    const fe = EMap[r.from], te = EMap[r.to];
    const dash = r.temporal ? '10,6' : 'none';
    const col = r.temporal ? '#64748b' : '#be185d';
    const op = r.temporal ? 0.5 : 0.4;

    if (r.via) {
      const ve = EMap[r.via];
      // from → diamond
      layers.relLines += sv('line',{x1:fe.x,y1:fe.y,x2:r.dx,y2:r.dy,stroke:col,'stroke-width':2,'stroke-opacity':op,'stroke-dasharray':dash});
      // diamond → via (associative)
      layers.relLines += sv('line',{x1:r.dx,y1:r.dy,x2:ve.x,y2:ve.y,stroke:col,'stroke-width':2,'stroke-opacity':op,'stroke-dasharray':dash});
      // via → to
      layers.relLines += sv('line',{x1:ve.x,y1:ve.y,x2:te.x,y2:te.y,stroke:col,'stroke-width':2,'stroke-opacity':op,'stroke-dasharray':dash});
    } else {
      layers.relLines += sv('line',{x1:fe.x,y1:fe.y,x2:r.dx,y2:r.dy,stroke:col,'stroke-width':2,'stroke-opacity':op,'stroke-dasharray':dash});
      layers.relLines += sv('line',{x1:r.dx,y1:r.dy,x2:te.x,y2:te.y,stroke:col,'stroke-width':2,'stroke-opacity':op,'stroke-dasharray':dash});
    }
  });

  // ── Entities + Attributes ──
  E.forEach(e => {
    const sc = S[e.schema];
    const n = e.attrs.length;

    // Faint ring circle
    layers.attrLines += sv('circle',{cx:e.x,cy:e.y,r:e.r,fill:'none',stroke:sc.c,'stroke-width':.5,'stroke-opacity':.12,'stroke-dasharray':'4,6'});

    // Attribute connector lines + ellipses
    e.attrs.forEach((a, i) => {
      const ang = (2*Math.PI*i/n) - Math.PI/2;
      const ax = e.x + e.r * Math.cos(ang);
      const ay = e.y + e.r * Math.sin(ang);

      // Connector line
      layers.attrLines += sv('line',{x1:e.x,y1:e.y,x2:ax,y2:ay,stroke:'#1e293b','stroke-width':1});

      // Ellipse size
      const rx = Math.max(40, a.n.length * 3.8 + 14);
      const ry = 16;

      // Determine style
      let eStroke = '#7c3aed', eFill='#0d0f1a', tFill='#c4b5fd';
      let sDash = 'none', sWidth = 1.3;
      let decoration = '', fStyle = 'normal', fWeight = 'normal';

      if (a.pk) { eStroke='#10b981'; eFill='#071a12'; tFill='#6ee7b7'; fWeight='bold'; decoration='underline'; }
      if (a.fk && !a.pk) { eStroke='#f59e0b'; eFill='#1a1408'; tFill='#fbbf24'; sDash='3,2'; fStyle='italic'; }
      if (a.fk && a.pk) { eStroke='#10b981'; eFill='#0a1a12'; tFill='#6ee7b7'; fWeight='bold'; decoration='underline'; sDash='none'; }
      if (a.dv) { eStroke='#818cf8'; eFill='#0d0e1a'; tFill='#a5b4fc'; sDash='5,3'; }

      layers.attrs += sv('ellipse',{cx:ax,cy:ay,rx,ry,fill:eFill,stroke:eStroke,'stroke-width':sWidth,'stroke-dasharray':sDash});

      // Text
      const fs = a.n.length > 24 ? 7.5 : (a.n.length > 18 ? 8 : 9);
      layers.attrs += sv('text',{x:ax,y:ay+3.5,'text-anchor':'middle',fill:tFill,'font-size':fs,'font-weight':fWeight,'font-style':fStyle,'text-decoration':decoration,'font-family':'Consolas,monospace'}, a.n);

      // PK / FK badge
      if (a.pk && a.fk) {
        layers.labels += sv('text',{x:ax,y:ay-ry-4,'text-anchor':'middle',fill:'#10b981','font-size':7,'font-weight':700}, 'PK,FK');
      } else if (a.pk) {
        layers.labels += sv('text',{x:ax,y:ay-ry-4,'text-anchor':'middle',fill:'#10b981','font-size':7,'font-weight':700}, 'PK');
      } else if (a.fk) {
        layers.labels += sv('text',{x:ax,y:ay-ry-4,'text-anchor':'middle',fill:'#f59e0b','font-size':7,'font-weight':700}, 'FK');
      }
      if (a.u) {
        layers.labels += sv('text',{x:ax,y:ay+ry+10,'text-anchor':'middle',fill:'#fbbf24','font-size':6.5,'font-weight':600}, 'UNIQUE');
      }
      if (a.dv) {
        layers.labels += sv('text',{x:ax,y:ay+ry+10,'text-anchor':'middle',fill:'#818cf8','font-size':6.5}, 'derived');
      }
    });

    // Entity rectangle
    const ew = Math.max(130, e.id.length * 10 + 40);
    const eh = 52;
    if (e.assoc) {
      layers.entities += sv('rect',{x:e.x-ew/2-5,y:e.y-eh/2-5,width:ew+10,height:eh+10,rx:5,fill:sc.bg,stroke:sc.c,'stroke-width':1.5});
    }
    layers.entities += sv('rect',{x:e.x-ew/2,y:e.y-eh/2,width:ew,height:eh,rx:4,fill:'#0f1629',stroke:sc.c,'stroke-width':2.5});

    // Schema label
    layers.entities += sv('text',{x:e.x,y:e.y-8,'text-anchor':'middle',fill:sc.c,'font-size':8.5,'font-weight':700,'letter-spacing':'1','font-family':'system-ui'}, e.schema.toUpperCase());
    // Entity name
    layers.entities += sv('text',{x:e.x,y:e.y+10,'text-anchor':'middle',fill:'#f1f5f9','font-size':13,'font-weight':700,'font-family':'system-ui'}, e.id);
  });

  // ── Relationship diamonds ──
  R.forEach(r => {
    const dw=80, dh=44;
    const pts = `${r.dx},${r.dy-dh/2} ${r.dx+dw/2},${r.dy} ${r.dx},${r.dy+dh/2} ${r.dx-dw/2},${r.dy}`;
    const dashAttr = r.temporal ? 'stroke-dasharray="5,3"' : '';
    layers.diamonds += `<polygon points="${pts}" fill="#1a0a1e" stroke="#f472b6" stroke-width="2" ${dashAttr}/>`;

    // Label
    layers.diamonds += sv('text',{x:r.dx,y:r.dy+3.5,'text-anchor':'middle',fill:'#f9a8d4','font-size':8.5,'font-weight':700}, r.label);
    // R-id
    layers.diamonds += sv('text',{x:r.dx,y:r.dy-dh/2-6,'text-anchor':'middle',fill:'#475569','font-size':8,'font-weight':600}, r.id);

    // Cardinality labels near the entities
    const fe = EMap[r.from], te = EMap[r.to];
    if (r.cF) {
      const ang = Math.atan2(r.dy-fe.y, r.dx-fe.x);
      const cx = fe.x + 50*Math.cos(ang) + 14*Math.sin(ang);
      const cy = fe.y + 50*Math.sin(ang) - 14*Math.cos(ang);
      layers.labels += sv('text',{x:cx,y:cy,'text-anchor':'middle',fill:'#fb7185','font-size':14,'font-weight':800}, r.cF);
    }
    if (r.cT) {
      let endE = te;
      if (r.via) {
        // Cardinality N is near the 'to' entity (SpaceObject for R5)
        endE = EMap[r.to];
        const ve = EMap[r.via];
        const ang = Math.atan2(endE.y-ve.y, endE.x-ve.x);
        const cx = endE.x - 50*Math.cos(ang) - 14*Math.sin(ang);
        const cy = endE.y - 50*Math.sin(ang) + 14*Math.cos(ang);
        layers.labels += sv('text',{x:cx,y:cy,'text-anchor':'middle',fill:'#fb7185','font-size':14,'font-weight':800}, r.cT);
      } else {
        const ang = Math.atan2(r.dy-endE.y, r.dx-endE.x);
        const cx = endE.x + 50*Math.cos(ang) + 14*Math.sin(ang);
        const cy = endE.y + 50*Math.sin(ang) - 14*Math.cos(ang);
        layers.labels += sv('text',{x:cx,y:cy,'text-anchor':'middle',fill:'#fb7185','font-size':14,'font-weight':800}, r.cT);
      }
    }
  });

  // Title block
  let title = '';
  title += sv('text',{x:W/2,y:80,'text-anchor':'middle',fill:'#93c5fd','font-size':28,'font-weight':800,'font-family':'system-ui'}, 'ORBITA — Complete ER Diagram');
  title += sv('text',{x:W/2,y:112,'text-anchor':'middle',fill:'#475569','font-size':14,'font-family':'system-ui'}, 'Orbital Registry for Big Data, Intelligence, and Traffic Analysis · Chen Notation');
  title += sv('text',{x:W/2,y:136,'text-anchor':'middle',fill:'#334155','font-size':11,'font-family':'system-ui'}, '9 Entities · 126 Attributes · 7 Relationships · 4 Schemas (catalog · tracking · telemetry · analytics)');

  return `<svg id="svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
    <rect width="${W}" height="${H}" fill="#080c14"/>
    ${layers.bg}
    ${title}
    ${layers.relLines}
    ${layers.attrLines}
    ${layers.attrs}
    ${layers.entities}
    ${layers.diamonds}
    ${layers.labels}
  </svg>`;
}

// ═══════════════════════════════════════════════════
//  PAN / ZOOM
// ═══════════════════════════════════════════════════
const vp = document.getElementById('viewport');
vp.innerHTML = buildSVG();
const svg = document.getElementById('svg');

let vb = {x:0, y:0, w:7000, h:6600};
const FULL = {x:0,y:0,w:7000,h:6600};
let isPanning = false, startPt = {x:0,y:0}, startVB = {};

function applyVB() { svg.setAttribute('viewBox',`${vb.x} ${vb.y} ${vb.w} ${vb.h}`); }

// fit to viewport on load
function resetView() {
  vb = {...FULL};
  applyVB();
  svg.style.width = '100%';
  svg.style.height = '100%';
}
resetView();

function zoomBy(factor) {
  const cx = vb.x + vb.w/2, cy = vb.y + vb.h/2;
  vb.w /= factor; vb.h /= factor;
  vb.x = cx - vb.w/2; vb.y = cy - vb.h/2;
  applyVB();
}

vp.addEventListener('wheel', ev => {
  ev.preventDefault();
  const rect = vp.getBoundingClientRect();
  const mx = (ev.clientX - rect.left) / rect.width;
  const my = (ev.clientY - rect.top) / rect.height;
  const px = vb.x + mx * vb.w;
  const py = vb.y + my * vb.h;
  const f = ev.deltaY < 0 ? 1.15 : 0.87;
  vb.w /= f; vb.h /= f;
  vb.x = px - mx * vb.w;
  vb.y = py - my * vb.h;
  applyVB();
}, {passive:false});

vp.addEventListener('pointerdown', ev => {
  isPanning = true; vp.classList.add('dragging');
  startPt = {x:ev.clientX, y:ev.clientY};
  startVB = {...vb};
  vp.setPointerCapture(ev.pointerId);
});
vp.addEventListener('pointermove', ev => {
  if (!isPanning) return;
  const rect = vp.getBoundingClientRect();
  const dx = (ev.clientX - startPt.x) / rect.width * startVB.w;
  const dy = (ev.clientY - startPt.y) / rect.height * startVB.h;
  vb.x = startVB.x - dx;
  vb.y = startVB.y - dy;
  applyVB();
});
vp.addEventListener('pointerup', () => { isPanning=false; vp.classList.remove('dragging'); });
</script>
</body>
</html>
